spring.application.name = library-mini

spring.datasource.url=jdbc:mysql://localhost:3306/library_db
spring.datasource.username=wulf
spring.datasource.password=wulf123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/data/insert_users_data.sql,\
                               classpath:db/data/insert_books_data.sql,\
                               classpath:db/data/insert_loans_data.sql
spring.sql.init.platform=mysql
spring.sql.init.continue-on-error=false

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl