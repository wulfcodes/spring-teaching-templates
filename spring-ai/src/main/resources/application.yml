spring:
  application:
    name: spring-ai
  ai:
    openai:
      # Inject the API key via environment variables for security
      api-key: ${GROQ_API_KEY}
      # Point the client to Groq's OpenAI-compatible endpoint
      base-url: https://api.groq.com/openai
      chat:
        options:
          # This model is very fast and great for streaming
          model: llama-3.3-70b-versatile
          temperature: 0.7