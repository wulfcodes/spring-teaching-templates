spring.application.name = secc

spring.datasource.url = jdbc:mysql://localhost:3306/task_db
spring.datasource.username = ${DB_USER}
spring.datasource.password = ${DB_PASS}
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size = 2
spring.datasource.hikari.minimum-idle = 1
spring.datasource.hikari.idle-timeout = 5000
spring.datasource.hikari.connection-timeout = 5000

spring.sql.init.mode = always
spring.sql.init.schema-locations = classpath:/db/schema/create_users_table.sql,classpath:/db/schema/create_authorities_table.sql,classpath:/db/schema/create_todos_table.sql
spring.sql.init.data-locations = classpath:/db/data/insert_users_data.sql,classpath:/db/data/insert_authorities_data.sql,classpath:/db/data/insert_todos_data.sql
spring.sql.init.platform = mysql
spring.sql.init.continue-on-error = true