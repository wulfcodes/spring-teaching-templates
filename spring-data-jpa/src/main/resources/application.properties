spring.application.name = jpa

# Core DataSource Properties
spring.datasource.url=jdbc:mysql://localhost:3306/school_db
spring.datasource.username=wulf
spring.datasource.password=wulf123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Tuning (Below are default used by Spring)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=MyHikariPool

# JPA Specific Properties
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy, org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
