<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Order Product</title>
</head>
<body>

<h1>Order Product</h1>

<form action="/confirm-product" method="post">
    <label for="productName">Product Name:</label><br>
    <input type="text" id="productName" name="productName" required><br><br>

    <label for="category">Category:</label><br>
    <input type="text" id="category" name="category" required><br><br>

    <label for="price">Price (₹):</label><br>
    <input type="number" id="price" name="price" min="1" step="0.01" required><br><br>

    <label for="discount">Discount (%):</label><br>
    <input type="number" id="discount" name="discount" min="0" max="100"><br><br>

    <label for="inStock">Available in Stock:</label><br>
    <select id="inStock" name="inStock">
        <option value="true">Yes</option>
        <option value="false">No</option>
    </select><br><br>

    <button type="submit">Save Product</button>
</form>

</body>
</html>
