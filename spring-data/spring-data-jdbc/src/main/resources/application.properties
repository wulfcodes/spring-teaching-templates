spring.application.name = jdbc

spring.datasource.url=jdbc:mysql://localhost:3306/student_db
spring.datasource.username=root
spring.datasource.password=your_secret_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema/students-schema.sql
spring.sql.init.data-locations=classpath:db/data/students-data.sql
spring.sql.init.platform=mysql
spring.sql.init.continue-on-error=false